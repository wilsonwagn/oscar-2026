<body>

<div class="bg-radial"></div>
<canvas id="stars"></canvas>

<div class="glow-line top"></div>
<div class="glow-line bottom"></div>

<!-- Corner ornaments -->
<div class="corner tl"><svg viewBox="0 0 60 60" fill="none"><path d="M2 58 L2 2 L58 2" stroke="#D4AF37" stroke-width="1.5"/><path d="M2 20 L12 2" stroke="#D4AF37" stroke-width=".8" opacity=".5"/><path d="M20 2 L2 12" stroke="#D4AF37" stroke-width=".8" opacity=".5"/><circle cx="2" cy="2" r="3" fill="#D4AF37" opacity=".8"/></svg></div>
<div class="corner tr"><svg viewBox="0 0 60 60" fill="none"><path d="M2 58 L2 2 L58 2" stroke="#D4AF37" stroke-width="1.5"/><path d="M2 20 L12 2" stroke="#D4AF37" stroke-width=".8" opacity=".5"/><path d="M20 2 L2 12" stroke="#D4AF37" stroke-width=".8" opacity=".5"/><circle cx="2" cy="2" r="3" fill="#D4AF37" opacity=".8"/></svg></div>
<div class="corner bl"><svg viewBox="0 0 60 60" fill="none"><path d="M2 58 L2 2 L58 2" stroke="#D4AF37" stroke-width="1.5"/><path d="M2 20 L12 2" stroke="#D4AF37" stroke-width=".8" opacity=".5"/><path d="M20 2 L2 12" stroke="#D4AF37" stroke-width=".8" opacity=".5"/><circle cx="2" cy="2" r="3" fill="#D4AF37" opacity=".8"/></svg></div>
<div class="corner br"><svg viewBox="0 0 60 60" fill="none"><path d="M2 58 L2 2 L58 2" stroke="#D4AF37" stroke-width="1.5"/><path d="M2 20 L12 2" stroke="#D4AF37" stroke-width=".8" opacity=".5"/><path d="M20 2 L2 12" stroke="#D4AF37" stroke-width=".8" opacity=".5"/><circle cx="2" cy="2" r="3" fill="#D4AF37" opacity=".8"/></svg></div>

<div class="content">
    <img class="oscar-statue" src="oscars-icon-logo.png" alt="Oscar Statuette"/>
    <p class="pre-title">Uma noite mágica no cinema</p>
    <h1 class="main-title">Oscar</h1>
    <p class="year-badge">2026</p>
    <div class="divider"></div>
    <p class="subtitle">✦ &nbsp; Wilson &amp; Vinicius &nbsp; ✦</p>
    <div class="btn-row">
        <a href="page_2.html" class="btn btn-primary" id="btn-categories">
            <span class="btn-icon">🎬</span>Categorias
        </a>
        <a href="page_1.html" class="btn btn-secondary" id="btn-rules">
            <span class="btn-icon">🏆</span>Regras &amp; Prêmios
        </a>
    </div>
</div>

<p class="footer-text">✦ &nbsp; Oscar Night 2026 &nbsp; ✦</p>

<script>
const canvas = document.getElementById('stars');
const ctx    = canvas.getContext('2d');
let W, H, particles = [];

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }

function createParticle() {
    return { x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.2+.2,
             alpha: Math.random()*.6+.1, speed: Math.random()*.3+.05,
             drift: (Math.random()-.5)*.15, pulse: Math.random()*Math.PI*2 };
}

function init() { resize(); particles = Array.from({length:160}, createParticle); }

function draw() {
    ctx.clearRect(0,0,W,H);
    const t = Date.now()/1000;
    particles.forEach(p => {
        const a = p.alpha*(0.6+0.4*Math.sin(t*1.2+p.pulse));
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle = `rgba(240,208,96,${a})`; ctx.fill();
        p.y -= p.speed; p.x += p.drift;
        if (p.y < -4) { p.y = H+4; p.x = Math.random()*W; }
    });
    requestAnimationFrame(draw);
}

window.addEventListener('resize', resize);
init(); draw();
</script>
</body>
</html>
